name: Signal Scout

on:
  schedule:
    - cron: '0 21 * * *'   # 7am AEST (UTC+10) — GitHub cron runs in UTC
    - cron: '0 3 * * *'    # 1pm AEST (UTC+10)
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  run-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: python -m unittest discover -p "test_*.py"

      - name: Write Google credentials file
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: printf '%s' "$GOOGLE_SHEETS_CREDS" > google_credentials.json

      - name: Run Signal Scout
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          GOOGLE_SHEETS_CREDS_FILE: google_credentials.json
          TWILIO_WHATSAPP_MODE: ${{ secrets.TWILIO_WHATSAPP_MODE }}
        run: python cattle_scout.py
